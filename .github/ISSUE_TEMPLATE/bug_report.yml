name: Bug Report
description: Report a reproducible Files_MacOS problem.
type: Bug
title: "Bug: "
body:
  - type: textarea
    attributes:
      label: 问题描述
      description: 请说明实际结果和预期结果。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    attributes:
      label: Files_MacOS 版本
      placeholder: "例如 0.1.13"
    validations:
      required: true
  - type: input
    attributes:
      label: macOS 版本与 Mac 型号
      placeholder: "例如 macOS 26.0 / Mac mini M4"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 安装方式
      options:
        - 公证 DMG
        - Rider / dotnet Debug
        - 自行构建的 Release
    validations:
      required: true
  - type: textarea
    attributes:
      label: 截图或日志
      description: 上传截图或日志前请移除用户名、路径等敏感信息。
