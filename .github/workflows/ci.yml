name: macOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.runtime }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        runtime: [osx-arm64, osx-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: >-
          dotnet build src/Files.App.MacOS/Files.App.MacOS.csproj
          -c Debug
          -r ${{ matrix.runtime }}
          -v:quiet
          -clp:ErrorsOnly
